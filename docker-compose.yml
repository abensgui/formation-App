version: "3.9"

services:

  # ── Application Flask ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: formation-app:latest
    container_name: formation-app
    restart: unless-stopped
    ports:
      - "3000:5000"
    environment:
      FLASK_ENV: production
      DB_PATH: /data/formations.db
    volumes:
      - app_data:/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - formation-net

  # ── (Optionnel) Nginx reverse proxy ───────────────────────────
  nginx:
    image: nginx:alpine
    container_name: formation-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - formation-net

  # ── (Optionnel) Base de données PostgreSQL ─────────────────────
  db:
    image: postgres:16-alpine
    container_name: formation-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: formations
      POSTGRES_USER: estuser
      POSTGRES_PASSWORD: estpass123
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estuser -d formations"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - formation-net
    # Note: l'app utilise SQLite par défaut (DB_PATH).
    # Pour utiliser PostgreSQL, installez psycopg2 et adaptez app.py.

  # ── (Optionnel) Adminer — interface DB ────────────────────────
  adminer:
    image: adminer:latest
    container_name: formation-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - formation-net

volumes:
  app_data:
    driver: local
  db_data:
    driver: local

networks:
  formation-net:
    driver: bridge
