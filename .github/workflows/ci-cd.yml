name: CI/CD — Formation App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: formation-app
  REGISTRY: ghcr.io

jobs:
  unit-tests:
    name: 🧪 Tests unitaires Flask
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Installer les dépendances
        run: pip install -r app/requirements.txt pytest

      - name: Tests Flask
        run: |
          cd app
          python -c "
          import os; os.environ['DB_PATH'] = '/tmp/test.db'
          from app import app
          c = app.test_client()
          r = c.get('/');       assert r.status_code == 200; print('✓ accueil')
          r = c.get('/health'); assert r.status_code == 200; print('✓ health')
          r = c.get('/add');    assert r.status_code == 200; print('✓ page ajout')
          r = c.post('/add', data=dict(titre='Test CI', duree='1 mois', niveau='Débutant', description='desc'), follow_redirects=True)
          assert r.status_code == 200; assert b'Test CI' in r.data; print('✓ ajout formation')
          print('Tous les tests unitaires passés !')
          "

  build:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e-tests:
    name: 🎭 Tests E2E — Playwright + Cucumber + Allure
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/package.json

      - name: Installer les dépendances Node.js
        working-directory: tests
        run: npm install

      - name: Installer Chromium
        working-directory: tests
        run: npx playwright install chromium --with-deps

      - name: Démarrer l'application
        run: |
          docker compose up -d --build app
          for i in $(seq 1 12); do
            curl -sf http://localhost:3000/health && echo "✅ App prête !" && break
            echo "Tentative $i/12..."; sleep 5
          done

      - name: Lancer Cucumber + Playwright
        working-directory: tests
        env:
          APP_URL: http://localhost:3000
        run: npx cucumber-js --config cucumber.config.js

      - name: Logs si échec
        if: failure()
        run: docker compose logs app

      - name: Arrêt des conteneurs
        if: always()
        run: docker compose down -v

      - uses: actions/setup-java@v4
        if: always()
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer Allure CLI
        if: always()
        run: |
          curl -sLo allure.tgz https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure.tgz -C /opt
          echo "/opt/allure-2.29.0/bin" >> $GITHUB_PATH

      - name: Générer le rapport Allure
        if: always()
        run: allure generate tests/allure-results --clean -o tests/allure-report

      - name: Upload résultats bruts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: tests/allure-results/
          retention-days: 7

      - name: Upload rapport HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-html
          path: tests/allure-report/
          retention-days: 14

  deploy:
    name: 🚀 Déploiement Render
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✅ Deploy triggered on Render"